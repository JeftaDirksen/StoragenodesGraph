services:
  storage-nodes-graph:
    container_name: storagenodesgraph
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - STORAGE_NODES=storagenode1:14002,storagenode2:14002
      - GRAPH_HISTORY=5weeks
      - GRAPH_WIDTH=1200
      - GRAPH_HEIGHT=600
